<!DOCTYPE html>
<html>

<head>
    <title>Vendedor</title>
    <link rel="stylesheet" href="/static/styles.css?v=2">
</head>

<body>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <ul class="flashes">
        {% for category, message in messages %}
        <li class="{{ category }}">{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}
    {% endwith %}

    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="/static/icono_ipera.png" alt="Logo iPera" class="logo-ipera">
            <div class="header-title-card">
                <div class="header-loader">
                    <p>Panel</p>
                    <div class="header-words">
                        <span class="header-word">Vendedor</span>
                        <span class="header-word">iPera</span>
                        <span class="header-word">{{ session['user'] }}</span>
                        <span class="header-word">de Gestión</span>
                        <span class="header-word">Vendedor</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="header-buttons">
            <a href="/logout"><button class="btn-logout">Cerrar Sesión</button></a>
        </div>
    </header>

    <div class="container">

        <div class="dashboard-menu">
            <a href="/registrar_venta"><button class="btn-dashboard">Registrar Venta</button></a>
            <a href="/ventas"><button class="btn-dashboard">Ver Historial de Ventas</button></a>
            <a href="/inventario"><button class="btn-dashboard">Ver Inventario</button></a>
        </div>

    </div>

</body>

</html>
